<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <!-- paper -->
  <rect width="1280" height="640" fill="#f6f5f0"/>

  <!-- masthead -->
  <text x="80" y="80" font-family="Georgia, 'Times New Roman', serif"
        font-size="44" fill="#0a0a0a" letter-spacing="-1">ax</text>
  <text x="142" y="80" font-family="Menlo, SFMono-Regular, monospace"
        font-size="12" letter-spacing="3" fill="#888">AGENT EXPERIENCE</text>
  <line x1="80" y1="104" x2="1200" y2="104" stroke="#111" stroke-width="2"/>

  <!-- hero: the message is the mark -->
  <text x="74" y="292" font-family="Georgia, 'Times New Roman', serif"
        font-size="185" fill="#0a0a0a" letter-spacing="-3">make your</text>
  <text x="74" y="462" font-family="Georgia, 'Times New Roman', serif"
        font-size="185" fill="#0a0a0a" letter-spacing="-3">agent learn</text>
  <!-- the full stop is the live pulse -->
  <g transform="translate(998 448)">
    <circle r="15" fill="#2f9e44"/>
    <circle r="25" fill="none" stroke="#2f9e44" stroke-opacity="0.3" stroke-width="3"/>
  </g>

  <!-- the mechanism, one line -->
  <text x="80" y="538" font-family="Menlo, SFMono-Regular, monospace"
        font-size="20" fill="#444">session ends → the agent writes its retro → the next session reads what worked</text>

  <!-- footer -->
  <line x1="80" y1="574" x2="1200" y2="574" stroke="#111" stroke-width="2"/>
  <text x="80" y="612" font-family="Menlo, SFMono-Regular, monospace"
        font-size="16" letter-spacing="1" fill="#111">ax.necmttn.com</text>
  <text x="1200" y="612" text-anchor="end"
        font-family="Menlo, SFMono-Regular, monospace"
        font-size="13" fill="#888">claude · codex · pi · opencode · cursor</text>
</svg>
