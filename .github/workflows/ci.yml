name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ hashFiles('bun.lock', '.github/workflows/ci.yml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('bun.lock', '.github/workflows/ci.yml') }}-
            ${{ runner.os }}-turbo-${{ hashFiles('bun.lock') }}-
            ${{ runner.os }}-turbo-

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - run: bun install --frozen-lockfile

      - run: bash -n install.sh

      - run: bun test

      - run: bun run typecheck

      - run: bun run --cwd apps/site typecheck

      - run: bun run check:cli-reference

      - run: bun run check:site-cli-reference

      - run: bun run check:no-node-fs

      - run: bun run check:record-select

      - run: bun run check:table-coverage

      - run: bun run build

      - name: Smoke compiled CLI
        run: |
          set -euo pipefail
          ./dist/axctl --version
          ./dist/axctl help
          ./dist/axctl daemon status --json
          ./dist/axctl doctor --json
