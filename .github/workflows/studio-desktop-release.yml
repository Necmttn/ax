name: studio-desktop-release

# Build, sign, notarize, and publish the ax studio desktop app (Electron).
#
# Per-arch matrix is required: stage-ax-source installs the HOST-arch native
# deps (e.g. lmdb for live ingest) into the bundled ax source, so an arm64
# runner cannot correctly produce an x64 app and vice-versa. Each runner fetches
# its arch's surreal+bun binaries, stages its arch's ax source, and builds ONLY
# its arch (`electron-builder --arm64|--x64`), publishing to the same GitHub
# release.
#
# Required repo secrets (Apple Developer Program):
#   CSC_LINK                  base64 of the Developer ID Application .p12
#   CSC_KEY_PASSWORD          password for that .p12
#   APPLE_ID                  Apple ID email for notarization
#   APPLE_APP_SPECIFIC_PASSWORD  app-specific password for that Apple ID
#   APPLE_TEAM_ID             Apple Developer Team ID
# GITHUB_TOKEN (provided) is used by electron-builder to upload release assets.

on:
  workflow_dispatch:
  push:
    tags:
      - "studio-desktop-v*"

permissions:
  contents: write # electron-builder uploads release assets

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Fetch vendored binaries (this arch)
        working-directory: apps/studio-desktop
        run: bun run scripts/fetch-binaries.ts --arch=${{ matrix.arch }}

      - name: Stage ax source + build renderer/main
        working-directory: apps/studio-desktop
        run: |
          bun run scripts/stage-ax-source.ts
          bun run build

      - name: electron-builder (sign + notarize + publish)
        working-directory: apps/studio-desktop
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bunx electron-builder --${{ matrix.arch }} --config electron-builder.config.cjs --publish always
