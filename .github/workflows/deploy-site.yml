name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "apps/site/**"
      - "apps/studio/**"
      - "docs/releases/**"
      - "CHANGELOG.md"
      - "install.sh"
      - "scripts/extract-stage-rationale.ts"
      - "scripts/stage-studio.ts"
  workflow_dispatch:

# Release merge + announcement merge land back-to-back; only the latest
# deploy matters.
concurrency:
  group: deploy-site
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - name: Build site
        working-directory: apps/site
        run: bun run build

      - name: Deploy to Cloudflare Pages
        working-directory: apps/site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bunx wrangler pages deploy dist/client --project-name=ax --branch=main
