name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to build artifacts for. Leave empty to run release-please.
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.tag_name == '') }}
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  release-announcement:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
      # Flip to "false" to keep the announcement PR open for human review
      # instead of merging (and publishing) it automatically.
      AUTO_MERGE: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the draft script can compute the release range

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Generate evidence draft
        run: bun scripts/create-release-announcement.ts "$VERSION" --force

      - name: Write announcement with Codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: workspace-write
          prompt: |
            You are running in CI for the ax repository, immediately after
            release v${{ needs.release-please.outputs.version }} was cut by
            Release Please.

            A draft announcement exists at
            docs/releases/v${{ needs.release-please.outputs.version }}.md.
            It was generated by scripts/create-release-announcement.ts and
            embeds the release-range evidence: previous tag, changed files,
            and the full commit list. Rewrite that file IN PLACE into the
            final release announcement.

            Rules:
            1. Follow the authoring rules in docs/releases/README.md exactly.
            2. Keep the YAML frontmatter shape. `version` and `date` stay
               as-is. Replace `title` with a short, specific announcement
               title (never "Release X.Y.Z"). Replace `summary` with one
               human-facing sentence.
            3. The `ax` CLI and its session graph are NOT available in this
               environment. Skip every instruction in the draft that says to
               run ax commands. Ground the narrative only in the embedded
               evidence plus what you can verify with read-only git commands
               (git log, git show, git diff) and files in this repo. Do not
               invent motivation; if evidence is thin, keep the announcement
               narrower and say what the commits prove.
            4. Final structure: Highlights, How we got here, What changed,
               Example (only when the release changes a command, API, config,
               schema, workflow, or output format), Why it matters. Drop the
               "Release range evidence" section and every template
               instruction from the final file.
            5. Only reference an image if a fitting file already exists under
               apps/site/public/releases/assets/. Never invent image paths.
               If none fits, omit the Visual evidence section.
            6. Write product language for ax users, not commit-log prose. Be
               specific: name commands, flags, schema fields, routes.
            7. The final file must contain ONLY the announcement (frontmatter
               + body). No placeholders, no instructions, no "Replace this"
               text.

            When you are done, the only modified file should be
            docs/releases/v${{ needs.release-please.outputs.version }}.md.

      - name: Validate announcement
        run: |
          set -euo pipefail
          FILE="docs/releases/v${VERSION}.md"
          test -s "$FILE"
          grep -q "^version: \"${VERSION}\"" "$FILE"
          grep -q '^title: ' "$FILE"
          grep -q '^summary: ' "$FILE"
          if grep -qiE 'replace this|release range evidence|ax:release-announcement' "$FILE"; then
            echo "template placeholders survived the Codex rewrite; refusing to publish" >&2
            exit 1
          fi

      - name: Open announcement PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          BRANCH="release-announcement/v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "docs/releases/v${VERSION}.md"
          git commit -m "docs(release): announcement for v${VERSION}"
          git push -f origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "docs(release): announcement for v${VERSION}" \
            --body "Codex-generated release announcement for v${VERSION}. Merging publishes it to the website changelog."
          if [ "$AUTO_MERGE" = "true" ]; then
            gh pr merge "$BRANCH" --squash --delete-branch
          fi

  build-artifacts:
    needs: release-please
    if: ${{ always() && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '') || needs.release-please.outputs.releases_created == 'true') }}
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            artifact: axctl-darwin-arm64
          - runner: ubuntu-24.04
            artifact: axctl-linux-x64
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so build-axctl.ts can bake the release tag

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install ripgrep (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install ripgrep (macOS)
        if: runner.os == 'macOS'
        run: brew install ripgrep

      - run: bun install --frozen-lockfile

      - run: bash -n install.sh

      - run: bun run typecheck

      - run: bun test

      - run: bun run check:cli-reference

      - run: bun scripts/build-axctl.ts apps/axctl/src/cli/index.ts dist/axctl

      - name: Smoke compiled CLI
        run: |
          set -euo pipefail
          ./dist/axctl --version
          ./dist/axctl help

      - name: Package binary
        run: |
          set -euo pipefail
          file dist/axctl
          mkdir -p package
          cp dist/axctl package/axctl
          chmod 755 package/axctl
          tar -czf "${{ matrix.artifact }}.tar.gz" -C package axctl

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  publish-artifacts:
    needs: [release-please, build-artifacts]
    if: ${{ always() && needs.build-artifacts.result == 'success' && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '') || needs.release-please.outputs.releases_created == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd release-assets
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="$(gh release view --repo "$GH_REPO" --json tagName --jq .tagName)"
          fi
          shasum -a 256 ./*.tar.gz > checksums.txt
          gh release upload "$TAG_NAME" ./*.tar.gz checksums.txt --repo "$GH_REPO" --clobber
