name: Release Please

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to build artifacts for. Leave empty to run release-please.
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.tag_name == '') }}
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  refresh-flake-hash:
    # Runs against release-please's PR branch (and any PR that edits bun.lock /
    # flake.nix). Recomputes the bun-deps fixed-output hash and commits back
    # so the tagged commit always builds with `nix run github:Necmttn/ax#...`.
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          fetch-depth: 0

      - name: Skip if PR is from a fork
        if: ${{ github.event.pull_request.head.repo.full_name != github.repository }}
        run: |
          echo "PR from fork; skipping hash refresh (no push access)."
          exit 0

      - name: Detect relevant changes
        id: changed
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "$base"...HEAD | grep -E '^(flake\.nix|bun\.lock|package\.json)$' >/dev/null; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: DeterminateSystems/nix-installer-action@main
        if: ${{ steps.changed.outputs.run == 'true' }}

      - uses: DeterminateSystems/magic-nix-cache-action@main
        if: ${{ steps.changed.outputs.run == 'true' }}

      - name: Install ripgrep
        if: ${{ steps.changed.outputs.run == 'true' }}
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Recompute flake hash
        if: ${{ steps.changed.outputs.run == 'true' }}
        run: bash scripts/update-flake-hash.sh

      - name: Commit if changed
        if: ${{ steps.changed.outputs.run == 'true' }}
        run: |
          set -euo pipefail
          if git diff --quiet -- flake.nix; then
            echo "flake.nix hash already correct; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore(nix): refresh flake hash"
          git push

  build-artifacts:
    needs: release-please
    if: ${{ always() && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '') || needs.release-please.outputs.releases_created == 'true') }}
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            artifact: axctl-darwin-arm64
          - runner: ubuntu-24.04
            artifact: axctl-linux-x64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - run: bun install --frozen-lockfile

      - run: bash -n install.sh

      - run: bun run typecheck

      - run: bun test

      - run: bun run check:cli-reference

      - run: bun build --compile --outfile=dist/axctl src/cli/index.ts

      - name: Smoke compiled CLI
        run: |
          set -euo pipefail
          ./dist/axctl --version
          ./dist/axctl help

      - name: Package binary
        run: |
          set -euo pipefail
          file dist/axctl
          mkdir -p package
          cp dist/axctl package/axctl
          chmod 755 package/axctl
          tar -czf "${{ matrix.artifact }}.tar.gz" -C package axctl

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error

  publish-artifacts:
    needs: [release-please, build-artifacts]
    if: ${{ always() && needs.build-artifacts.result == 'success' && (github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.tag_name != '') || needs.release-please.outputs.releases_created == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          cd release-assets
          if [ -z "$TAG_NAME" ]; then
            TAG_NAME="$(gh release view --repo "$GH_REPO" --json tagName --jq .tagName)"
          fi
          shasum -a 256 ./*.tar.gz > checksums.txt
          gh release upload "$TAG_NAME" ./*.tar.gz checksums.txt --repo "$GH_REPO" --clobber
